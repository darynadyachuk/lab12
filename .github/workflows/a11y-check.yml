name: Accessibility Check

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  pa11y:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 12/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Start preview server
        # Явно вказуємо хост 127.0.0.1, щоб wait-on точно його знайшов
        run: npm run preview -- --port 5173 --host 127.0.0.1 &

      - name: Wait for server
        # Використовуємо http-get, щоб переконатися, що сервер віддає контент
        run: npx wait-on http-get://127.0.0.1:5173 --timeout 60000

      - name: Run accessibility checks
        run: npx pa11y-ci --config .pa11yci