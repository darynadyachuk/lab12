name: Accessibility Check

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  pa11y:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Стабільна версія

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Стабільна версія
        with:
          node-version: 20 # Або 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Start preview server
        # Використовуємо стандартний preview. 
        # Додаємо &, щоб сервер працював у фоні
        run: npm run preview -- --port 5173 &

      - name: Wait for server
        # Чекаємо, поки сервер реально почне відповідати
        run: npx wait-on http://127.0.0.1:5173 --timeout 60000

      - name: Run accessibility checks
        # Якщо в .pa11yci прописані повні URL (http://localhost:5173/...), 
        # то просто запускаємо конфіг:
        run: npx pa11y-ci --config 12/.pa11yci