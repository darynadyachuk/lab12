name: Accessibility Check

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  pa11y:
    runs-on: ubuntu-latest
    
    # Цей блок каже GitHub Actions працювати всередині папки '12'
    defaults:
      run:
        working-directory: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # Вказуємо шлях до lock-файлу для кешування
          cache-dependency-path: 12/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix 12

      - name: Build app
        run: npm run build

      - name: Start preview server
        # Додаємо &, щоб працював у фоні
        run: npm run preview -- --port 5173 &

      - name: Wait for server
        run: npx wait-on http://127.0.0.1:5173 --timeout 60000

      - name: Run accessibility checks
        # Оскільки ми вже в папці '12', шлях до конфігу буде '.pa11yci' (якщо він там лежить)
        # Якщо файл '.pa11yci' лежить у папці '12', використовуйте шлях нижче:
        run: npx pa11y-ci --config .pa11yci