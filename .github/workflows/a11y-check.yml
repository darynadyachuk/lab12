name: Accessibility Check and Deploy

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  pa11y:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 12/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Start preview server
        run: npm run preview -- --host 127.0.0.1 --port 5173 &

      - name: Wait for server
        run: npx wait-on http-get://127.0.0.1:5173 --timeout 60000

      - name: Run accessibility checks (Light mode)
        run: npx pa11y-ci --config .pa11yci

      - name: Run accessibility checks (Dark mode)
        run: npx pa11y-ci --config .pa11yci-dark.json

      - name: Setup Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v4

      - name: Upload artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: '12/dist'

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push'
        id: deployment
        uses: actions/deploy-pages@v4