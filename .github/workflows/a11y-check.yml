name: Accessibility Check

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  pa11y:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 12/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Start preview server
        # Використовуємо 127.0.0.1, щоб точно збігалося з wait-on
        run: npm run preview -- --host 127.0.0.1 --port 5173 &

      - name: Wait for server
        run: npx wait-on http-get://127.0.0.1:5173 --timeout 60000

      - name: Run accessibility checks (Light mode)
        run: npx pa11y-ci --config .pa11yci

      - name: Run accessibility checks (Dark mode)
        # Переконайтеся, що файл .pa11yci-dark.json існує у папці 12
        run: npx pa11y-ci --config .pa11yci-dark.json